spring:
  application:
    name: recruit

  datasource:
    url: jdbc:mysql://localhost:3306/recruit?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8080

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.phuocloc.projectfinal.recruit.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    org.flywaydb: DEBUG
