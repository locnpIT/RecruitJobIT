spring:
  application:
    name: recruit

  config:
    # kiến thức mới, thêm cái này vô để đọc được .env springboot
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true


  jackson:
    time-zone: Asia/Ho_Chi_Minh

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret-base64: ${APP_JWT_SECRET_BASE64:${SECRET_KEY_JWT:}}
    access-token-expiration-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1000}
  cloudinary:
    cloud-name: ${APP_CLOUDINARY_CLOUD_NAME:}
    api-key: ${APP_CLOUDINARY_API_KEY:}
    api-secret: ${APP_CLOUDINARY_API_SECRET:}
    folder: ${APP_CLOUDINARY_FOLDER:recruit/proofs}
  sepay:
    merchant-id: ${APP_SEPAY_MERCHANT_ID:}
    merchant-secret-key: ${APP_SEPAY_MERCHANT_SECRET_KEY:}
    bank-short-name: ${APP_SEPAY_BANK_SHORT_NAME:}
    bank-account-number: ${APP_SEPAY_BANK_ACCOUNT_NUMBER:}
    payment-code-prefix: ${APP_SEPAY_PAYMENT_CODE_PREFIX:GOI}
    webhook-secret-key: ${APP_SEPAY_WEBHOOK_SECRET_KEY:}
    webhook-url: ${APP_SEPAY_WEBHOOK_URL:}
    qr-image-base-url: ${APP_SEPAY_QR_IMAGE_BASE_URL:https://qr.sepay.vn/img}
    checkout-init-url: ${APP_SEPAY_CHECKOUT_INIT_URL:https://pay-sandbox.sepay.vn/v1/checkout/init}
    checkout-currency: ${APP_SEPAY_CHECKOUT_CURRENCY:VND}
    checkout-operation: ${APP_SEPAY_CHECKOUT_OPERATION:PURCHASE}
    checkout-success-url: ${APP_SEPAY_CHECKOUT_SUCCESS_URL:}
    checkout-error-url: ${APP_SEPAY_CHECKOUT_ERROR_URL:}
    checkout-cancel-url: ${APP_SEPAY_CHECKOUT_CANCEL_URL:}
    checkout-payment-method: ${APP_SEPAY_CHECKOUT_PAYMENT_METHOD:}

server:
  port: 8080

logging:
  level:
    com.phuocloc.projectfinal: DEBUG
